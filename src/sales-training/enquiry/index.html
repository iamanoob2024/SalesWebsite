<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>In-House Training Enquiry — Clarity Awareness</title>

  <!-- ============================================================
       CONFIG BLOCK — EDIT THIS SECTION ONLY
       ============================================================ -->
  <script>
    const CONFIG = {
      site: {
        name: "CLARITY AWARENESS",
        tagline: "COGNITIVE ARCHITECTURE SYSTEMS",
        nav: [
          { label: "PROGRAMME", href: "/" },
          { label: "ABOUT",     href: "/about/" },
          { label: "ARTICLES",  href: "/articles/" },
          { label: "PRICING",   href: "/pricing/" },
          { label: "FAQ",       href: "/faq/" },
          { label: "REGISTER",  href: "/register/", active: true }
        ]
      },

      page: {
        eyebrow:  "IN-HOUSE TRAINING ENQUIRY",
        headline: "Tell us about your team.",
        respond_promise: "We respond within one business day.",
        image_placeholder: {
          // Replace src with your image or video URL when ready.
          // Set type to "image" or "video"
          type: "image",
          src: "",
          alt: "Clarity Awareness In-House Training"
        }
      },

      hrdc: {
        question: "Is your organisation registered as an HRDC Training Provider and would you like to claim this as an in-house training with an external trainer?",
        discount_label: "10% off applies",
        yes_note: "Select YES to receive HRDC claim guidance with your enquiry confirmation.",
        content_yes: "[HRDC_CONTENT — paste HRDC claim process explanation here. This text will appear in the confirmation email sent to organisations selecting YES.]"
      },

      worker_url: "https://cac-leads.clarityawarenesscoaching.workers.dev/corporate-enquiry",

      telegram: {
        // Fill in after Telegram bot setup (instructions below)
        bot_token: "TELEGRAM_BOT_TOKEN",
        chat_id:   "TELEGRAM_CHAT_ID"
      },

      messages: {
        success: "Enquiry received. We'll be in touch within one business day.",
        error:   "Something went wrong. Please email us directly."
      }
    };
  </script>
  <!-- ============================================================
       END CONFIG BLOCK
       ============================================================ -->

  <style>
    /* ── Reset & Tokens ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #f5f0e8;
      --ink:     #1a1612;
      --mid:     #6b6560;
      --rule:    #d4cdc4;
      --red:     #8b1a1a;
      --white:   #ffffff;
      --font-display: 'Georgia', 'Times New Roman', serif;
      --font-ui: 'Courier New', 'Courier', monospace;
      --radius: 2px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font-display);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 28px 48px 24px;
      border-bottom: 1px solid var(--rule);
      position: relative;
      z-index: 100;
    }

    .nav-brand { text-decoration: none; }
    .nav-brand-name {
      display: block;
      font-family: var(--font-ui);
      font-size: 13px;
      letter-spacing: 0.18em;
      color: var(--ink);
      font-weight: normal;
    }
    .nav-brand-tagline {
      display: block;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--mid);
      margin-top: 3px;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center;
      list-style: none;
      padding-top: 4px;
    }
    .nav-links a {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--ink); }
    .nav-links a.register { color: var(--ink); font-weight: bold; }

    /* ── Peel overlay ── */
    #peel-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      overflow: hidden;
    }

    #peel-layer {
      position: absolute;
      inset: 0;
      background: var(--ink);
      opacity: 0.88;
      transform-origin: bottom left;
      animation: peelOff 1.1s cubic-bezier(0.77, 0, 0.18, 1) 0.3s forwards;
    }

    /* Fold crease line */
    #peel-layer::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 200%;
      height: 2px;
      background: rgba(255,255,255,0.12);
      transform-origin: bottom left;
    }

    @keyframes peelOff {
      0%   { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
      100% { clip-path: polygon(0 0, 100% 0, 100% 0%, 100% 0); }
    }

    /* ── Main layout ── */
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 89px);
    }

    /* ── Form side ── */
    .form-side {
      padding: 64px 56px 64px 48px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--rule);
    }

    .eyebrow {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.22em;
      color: var(--red);
      margin-bottom: 20px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(28px, 3vw, 40px);
      font-weight: normal;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 44px;
    }

    /* ── Form fields ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px 20px;
      margin-bottom: 24px;
    }

    .field-full { grid-column: 1 / -1; }

    label {
      display: block;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--mid);
      margin-bottom: 8px;
    }

    input, textarea {
      width: 100%;
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    input::placeholder, textarea::placeholder { color: var(--rule); }
    input:focus, textarea:focus { border-color: var(--ink); }

    textarea {
      resize: vertical;
      min-height: 110px;
      line-height: 1.6;
    }

    /* ── HRDC toggle ── */
    .hrdc-block {
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
      background: rgba(255,255,255,0.4);
    }

    .hrdc-question {
      font-family: var(--font-display);
      font-size: 13px;
      color: var(--ink);
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .hrdc-discount {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--red);
      margin-bottom: 14px;
    }

    .hrdc-options {
      display: flex;
      gap: 12px;
    }

    .hrdc-btn {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.18em;
      padding: 9px 24px;
      border: 1px solid var(--rule);
      background: transparent;
      color: var(--mid);
      cursor: pointer;
      border-radius: var(--radius);
      transition: all 0.2s;
    }

    .hrdc-btn:hover { border-color: var(--ink); color: var(--ink); }
    .hrdc-btn.selected-yes { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .hrdc-btn.selected-no  { background: var(--rule); color: var(--ink); border-color: var(--rule); }

    .hrdc-note {
      font-family: var(--font-display);
      font-size: 12px;
      color: var(--mid);
      margin-top: 12px;
      font-style: italic;
      display: none;
    }
    .hrdc-note.visible { display: block; }

    /* ── Submit ── */
    .submit-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 4px;
    }

    button[type="submit"] {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.2em;
      padding: 14px 32px;
      background: var(--ink);
      color: var(--cream);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button[type="submit"]:hover { opacity: 0.8; }
    button[type="submit"]:disabled { opacity: 0.4; cursor: not-allowed; }

    .respond-note {
      font-family: var(--font-display);
      font-size: 12px;
      color: var(--mid);
      font-style: italic;
    }

    .form-message {
      margin-top: 16px;
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.12em;
      display: none;
    }
    .form-message.success { color: #2d6a2d; display: block; }
    .form-message.error   { color: var(--red); display: block; }

    /* ── Image side ── */
    .image-side {
      position: relative;
      background: var(--ink);
      min-height: 100%;
      display: flex;
      align-items: stretch;
    }

    .image-placeholder {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 48px;
      color: rgba(255,255,255,0.2);
    }

    .image-placeholder svg {
      width: 48px;
      height: 48px;
      opacity: 0.3;
    }

    .image-placeholder-label {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.25em;
      text-align: center;
      opacity: 0.4;
    }

    .image-side img,
    .image-side video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
      display: none;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .image-side { display: none; }
      nav { padding: 20px 24px; }
      .nav-links { gap: 16px; }
      .form-side { padding: 40px 24px; }
    }
  </style>
</head>
<body>

  <!-- Peel effect overlay -->
  <div id="peel-overlay">
    <div id="peel-layer"></div>
  </div>

  <!-- Nav (rendered by JS from CONFIG) -->
  <nav id="nav"></nav>

  <main>
    <!-- Form side -->
    <section class="form-side">
      <p class="eyebrow" id="eyebrow"></p>
      <h1 id="headline"></h1>

      <form id="enquiry-form" novalidate>

        <div class="form-grid">
          <div>
            <label for="name">YOUR NAME</label>
            <input type="text" id="name" name="name" placeholder="Full name" required />
          </div>
          <div>
            <label for="email">WORK EMAIL</label>
            <input type="email" id="email" name="email" placeholder="you@company.com" required />
          </div>
          <div>
            <label for="company">COMPANY</label>
            <input type="text" id="company" name="company" placeholder="Organisation name" required />
          </div>
          <div>
            <label for="phone">PHONE</label>
            <input type="tel" id="phone" name="phone" placeholder="+60 ..." />
          </div>
          <div>
            <label for="participants">NUMBER OF PARTICIPANTS</label>
            <input type="text" id="participants" name="participants" placeholder="e.g. 12" />
          </div>
          <div>
            <label for="dates">PREFERRED DATE RANGE</label>
            <input type="text" id="dates" name="dates" placeholder="e.g. Q3 2025, flexible" />
          </div>
          <div class="field-full">
            <label for="message">ANYTHING ELSE WE SHOULD KNOW?</label>
            <textarea id="message" name="message" placeholder="Industry, team context, specific objectives..."></textarea>
          </div>
        </div>

        <!-- HRDC Block -->
        <div class="hrdc-block" id="hrdc-block">
          <p class="hrdc-question" id="hrdc-question"></p>
          <p class="hrdc-discount" id="hrdc-discount"></p>
          <div class="hrdc-options">
            <button type="button" class="hrdc-btn" id="btn-yes" onclick="selectHRDC('yes')">YES</button>
            <button type="button" class="hrdc-btn" id="btn-no"  onclick="selectHRDC('no')">NO</button>
          </div>
          <p class="hrdc-note" id="hrdc-note"></p>
        </div>

        <div class="submit-row">
          <button type="submit" id="submit-btn">SEND ENQUIRY</button>
          <span class="respond-note" id="respond-note"></span>
        </div>

        <p class="form-message" id="form-message"></p>

      </form>
    </section>

    <!-- Image / video side -->
    <aside class="image-side" id="image-side">
      <div class="image-placeholder" id="img-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p class="image-placeholder-label">IMAGE OR VIDEO<br>DROPS HERE</p>
      </div>
      <img id="side-image" alt="" />
      <video id="side-video" autoplay muted loop playsinline></video>
    </aside>
  </main>

  <script>
    // ── Render nav ──
    (function() {
      const nav = document.getElementById('nav');
      const brand = document.createElement('a');
      brand.href = '/';
      brand.className = 'nav-brand';
      brand.innerHTML = `<span class="nav-brand-name">${CONFIG.site.name}</span><span class="nav-brand-tagline">${CONFIG.site.tagline}</span>`;
      nav.appendChild(brand);

      const ul = document.createElement('ul');
      ul.className = 'nav-links';
      CONFIG.site.nav.forEach(item => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = item.href;
        a.textContent = item.label;
        if (item.active) a.className = 'active register';
        li.appendChild(a);
        ul.appendChild(li);
      });
      nav.appendChild(ul);
    })();

    // ── Render page text ──
    document.getElementById('eyebrow').textContent    = CONFIG.page.eyebrow;
    document.getElementById('headline').textContent   = CONFIG.page.headline;
    document.getElementById('respond-note').textContent = CONFIG.page.respond_promise;
    document.getElementById('hrdc-question').textContent = CONFIG.hrdc.question;
    document.getElementById('hrdc-discount').textContent = CONFIG.hrdc.discount_label;
    document.getElementById('hrdc-note').textContent  = CONFIG.hrdc.yes_note;

    // ── Image/video side ──
    (function() {
      const img  = CONFIG.page.image_placeholder;
      if (!img.src) return;
      if (img.type === 'video') {
        const v = document.getElementById('side-video');
        v.src = img.src;
        v.style.display = 'block';
        document.getElementById('img-placeholder').style.display = 'none';
      } else {
        const i = document.getElementById('side-image');
        i.src = img.src;
        i.alt = img.alt;
        i.style.display = 'block';
        document.getElementById('img-placeholder').style.display = 'none';
      }
    })();

    // ── HRDC toggle ──
    let hrdcValue = null;

    function selectHRDC(val) {
      hrdcValue = val;
      document.getElementById('btn-yes').className = 'hrdc-btn' + (val === 'yes' ? ' selected-yes' : '');
      document.getElementById('btn-no').className  = 'hrdc-btn' + (val === 'no'  ? ' selected-no'  : '');
      const note = document.getElementById('hrdc-note');
      note.className = val === 'yes' ? 'hrdc-note visible' : 'hrdc-note';
    }

    // ── Form submission ──
    document.getElementById('enquiry-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const btn = document.getElementById('submit-btn');
      const msg = document.getElementById('form-message');
      btn.disabled = true;
      btn.textContent = 'SENDING...';
      msg.className = 'form-message';

      const payload = {
        name:         document.getElementById('name').value.trim(),
        email:        document.getElementById('email').value.trim(),
        company:      document.getElementById('company').value.trim(),
        phone:        document.getElementById('phone').value.trim(),
        participants: document.getElementById('participants').value.trim(),
        dates:        document.getElementById('dates').value.trim(),
        message:      document.getElementById('message').value.trim(),
        hrdc:         hrdcValue,
        submitted_at: new Date().toISOString()
      };

      try {
        const res = await fetch(CONFIG.worker_url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error('Worker error');

        msg.textContent = CONFIG.messages.success;
        msg.className = 'form-message success';
        document.getElementById('enquiry-form').reset();
        hrdcValue = null;
        document.getElementById('btn-yes').className = 'hrdc-btn';
        document.getElementById('btn-no').className  = 'hrdc-btn';
        document.getElementById('hrdc-note').className = 'hrdc-note';

      } catch (err) {
        msg.textContent = CONFIG.messages.error;
        msg.className = 'form-message error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'SEND ENQUIRY';
      }
    });
  </script>

</body>
</html>
