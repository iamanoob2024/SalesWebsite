<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAC Cinematic</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --cac-near-black:#141414;
  --cac-surface-white:#F8F7F4;
  --cac-mid-grey:#8A8A8A;
  --cac-light-grey:#E2E0DC;
  --cac-cold-red:#C0392B;
  --cac-system-blue:#1A3A5C;
}

body {
  margin:0;
  font-family:'JetBrains Mono', monospace;
}

/* 🔥 FIX: TOP ALIGN INSTEAD OF CENTER */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
  align-items:flex-start;
}

.section { padding:180px 60px; }

.dark {
  background:var(--cac-near-black);
  color:var(--cac-surface-white);
}

.label {
  font-size:10px;
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:var(--cac-cold-red);
  margin-bottom:10px;
}

h1,h2 {
  font-family:'Cormorant Garamond', serif;
  font-weight:300;
}

h1 { font-size:clamp(52px,6vw,88px); }
h2 { font-size:clamp(32px,4vw,52px); }

p {
  font-size:13px;
  line-height:1.8;
}

.image-frame {
  position:relative;
  width:100%;
  height:800px;
  border:1px solid var(--cac-light-grey);
  background:#222;
  overflow:hidden;
}

.image-frame img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TELEPROMPTER */
.teleprompter {
  height:200px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
}

.teleprompter-content {
  position:absolute;
  animation:scrollText 12s linear infinite;
}

.teleprompter.paused .teleprompter-content {
  animation-play-state: paused;
}

@keyframes scrollText {
  from { transform:translateY(100%); }
  to { transform:translateY(-100%); }
}

/* CAROUSEL */
.carousel-full {
  position:relative;
  height:520px;
}

.carousel-frame {
  position:absolute;
  inset:0;
  overflow:hidden;
}

.carousel-track {
  display:flex;
  gap:60px;
  height:100%;
  align-items:center;
  cursor:grab;
  overflow-x:auto;
  scroll-behavior:smooth;
}

.card {
  flex:0 0 300px;
  height:380px;
}

.card img {
  width:100%;
  height:100%;
  object-fit:cover;
  filter:blur(8px) brightness(0.5);
  transform:scale(0.7);
  transition:all 0.5s ease;
}

.card.active img {
  filter:blur(0px) brightness(1);
  transform:scale(1.1);
}

.carousel-frame::before,
.carousel-frame::after {
  content:"";
  position:absolute;
  top:0;
  width:160px;
  height:100%;
  z-index:10;
}

.carousel-frame::before {
  left:0;
  background:linear-gradient(to right, var(--cac-near-black), transparent);
}

.carousel-frame::after {
  right:0;
  background:linear-gradient(to left, var(--cac-near-black), transparent);
}

.arrow {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  font-weight:bold;
  color:var(--cac-cold-red);
  text-shadow:0 0 12px var(--cac-cold-red);
  cursor:pointer;
  z-index:30;
}

.arrow.left { left:10px; }
.arrow.right { right:10px; }

.carousel-center-title {
  text-align:center;
  margin-bottom:60px;
  color:var(--cac-cold-red);
  position:relative;
  z-index:25;
}

/* FOOTER */
.footer-bar {
  background:var(--cac-near-black);
  color:var(--cac-surface-white);
  text-align:center;
  padding:24px;
}

.email-hover {
  display:inline-block;
  position:relative;
  cursor:pointer;
}

.email-box {
  position:absolute;
  top:-40px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  color:var(--cac-system-blue);
  padding:6px 12px;
  font-size:12px;
  display:none;
}

.email-hover:hover .email-box {
  display:block;
}

@media (max-width:900px) {
  .grid {
    grid-template-columns:1fr;
  }

  .section {
    padding:100px 24px;
  }
}
</style>
</head>

<body>

<script>
const SITE_CONFIG = {
  intro: {
    title: "Your Title",
    label: "01 — INTRO",
    text: [
      "Scrolling narrative line 1 Scrolling narrative line 1 Scrolling narrative line 1",
      "Scrolling narrative line 2",
      "Scrolling narrative line 3"
    ],
    image: "image_1.jpg"
  },

  structure: {
    label: "02 — STRUCTURE",
    title: "Second Block",
    text: [
      "System explanation line 1 System explanation line 1 System explanation line 1",
      "System explanation line 2"
    ],
    image: "block_2.png"
  },

  portfolio: {
    label: "03 — PORTFOLIO",
    title: "Lovinia's Work",
    images: [
      "https://via.placeholder.com/400",
      "https://via.placeholder.com/400",
      "https://via.placeholder.com/400",
      "https://via.placeholder.com/400",
      "https://via.placeholder.com/400",
      "https://via.placeholder.com/400"
    ]
  },

  footer: {
    email: "clarityawarenesscoaching@gmail.com",
    policy: "Policy"
  }
};
</script>

<!-- INTRO -->
<section class="section dark">
  <div class="grid">
    <div>
      <div class="image-frame" id="intro-image"></div>
    </div>

    <div>
      <div class="label" id="intro-label"></div>
      <h1 id="intro-title"></h1>

      <div class="teleprompter" onclick="toggleScroll(this)">
        <div class="teleprompter-content" id="intro-text"></div>
      </div>
    </div>
  </div>
</section>

<!-- STRUCTURE -->
<section class="section">
  <div class="grid">
    <div>
      <div class="label" id="structure-label"></div>
      <h2 id="structure-title"></h2>

      <div class="teleprompter" onclick="toggleScroll(this)">
        <div class="teleprompter-content" id="structure-text"></div>
      </div>
    </div>

    <div>
      <div class="image-frame" id="structure-image"></div>
    </div>
  </div>
</section>

<!-- PORTFOLIO -->
<section class="section dark">

  <div class="carousel-center-title">
    <div class="label" id="portfolio-label"></div>
    <h2 id="portfolio-title"></h2>
  </div>

  <div class="carousel-full">
    <div class="carousel-frame">
      <div class="arrow left" onclick="scrollStep(-1)">&#8592;</div>
      <div class="arrow right" onclick="scrollStep(1)">&#8594;</div>

      <div class="carousel-track" id="track"></div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<div class="footer-bar">
  <div class="email-hover">
    📧 Email
    <div class="email-box" id="email"></div>
  </div>
  · <span id="policy"></span>
</div>

<script>
function toggleScroll(el){
  el.classList.toggle('paused');
}

function renderSite(){
  const { intro, structure, portfolio, footer } = SITE_CONFIG;

  // INTRO
  document.getElementById("intro-title").textContent = intro.title;
  document.getElementById("intro-label").textContent = intro.label;

  document.getElementById("intro-text").innerHTML =
    intro.text.map(t => `<p>${t}</p>`).join("");

  document.getElementById("intro-image").innerHTML =
    `<img src="${intro.image}">`;

  // STRUCTURE
  document.getElementById("structure-title").textContent = structure.title;
  document.getElementById("structure-label").textContent = structure.label;

  document.getElementById("structure-text").innerHTML =
    structure.text.map(t => `<p>${t}</p>`).join("");

  document.getElementById("structure-image").innerHTML =
    `<img src="${structure.image}">`;

  // PORTFOLIO
  document.getElementById("portfolio-label").textContent = portfolio.label;
  document.getElementById("portfolio-title").textContent = portfolio.title;

  document.getElementById("track").innerHTML =
    portfolio.images.map(img => `
      <a href="#" class="card">
        <img src="${img}">
      </a>
    `).join("");

  // FOOTER
  document.getElementById("email").textContent = footer.email;
  document.getElementById("policy").textContent = footer.policy;
}

renderSite();

// CAROUSEL BEHAVIOR
const track = document.getElementById('track');
let isDown=false,startX,scrollLeft,velocity=0,raf;

track.addEventListener('mousedown', e=>{
  isDown=true;
  startX=e.pageX;
  scrollLeft=track.scrollLeft;
  cancelAnimationFrame(raf);
});

document.addEventListener('mouseup', ()=>{
  isDown=false;
  momentum();
});

track.addEventListener('mousemove', e=>{
  if(!isDown) return;
  const x=e.pageX;
  const walk=(x-startX)*1.5;
  velocity=walk;
  track.scrollLeft=scrollLeft-walk;
});

function momentum(){
  velocity*=0.95;
  track.scrollLeft-=velocity;
  if(Math.abs(velocity)>0.5){
    raf=requestAnimationFrame(momentum);
  }
}

function scrollStep(dir){
  track.scrollBy({left:dir*320,behavior:'smooth'});
}

let auto=setInterval(()=>{track.scrollLeft+=1;},20);
track.addEventListener('mouseenter',()=>clearInterval(auto));
track.addEventListener('mouseleave',()=>auto=setInterval(()=>{track.scrollLeft+=1;},20));

function updateCenter(){
  const cards=document.querySelectorAll('.card');
  const frame=document.querySelector('.carousel-frame').getBoundingClientRect();
  const center=frame.left+frame.width/2;

  cards.forEach(card=>{
    const rect=card.getBoundingClientRect();
    const c=rect.left+rect.width/2;
    const d=Math.abs(center-c);

    if(d<150) card.classList.add('active');
    else card.classList.remove('active');
  });

  requestAnimationFrame(updateCenter);
}

updateCenter();
</script>

</body>
</html>
